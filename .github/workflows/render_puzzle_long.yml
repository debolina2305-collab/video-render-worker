name: Puzzle Render — Long Format

on:
  repository_dispatch:
    types: [trigger-puzzle-render]

  workflow_dispatch:

concurrency:
  group: render-puzzle-long
  cancel-in-progress: false

jobs:
  render-puzzle-long:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── GATE ────────────────────────────────────────────────────────────────
      # Polls puzzle table for long_status=pending_long.
      # Exits in ~2s if none — zero wasted CI minutes.
      - name: Gate — check for pending long puzzle rows
        id: gate
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ROWS=$(curl -sf \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/puzzle?long_status=eq.pending_long&assigned_format=eq.long&is_active=eq.true&puzzle_enriched=eq.true&select=id&limit=1" \
          | jq 'length' 2>/dev/null || echo "0")
          echo "pending=$ROWS" >> $GITHUB_OUTPUT
          if [ "$ROWS" = "0" ]; then
            echo "[GATE] No pending long puzzle rows — skipping render."
          else
            echo "[GATE] Found $ROWS pending long puzzle row(s) — proceeding."
          fi

      - name: Install FFmpeg, Python and Chromium runtime deps
        if: steps.gate.outputs.pending != '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils
          pip3 install --break-system-packages edge-tts

      - name: Test edge-tts
        if: steps.gate.outputs.pending != '0'
        run: |
          edge-tts --voice en-US-JennyNeural --text "Brain challenge loading." --write-media /tmp/test.mp3
          ls -la /tmp/test.mp3

      - name: Setup Node.js
        if: steps.gate.outputs.pending != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.gate.outputs.pending != '0'
        run: npm install

      - name: Render long puzzle video
        if: steps.gate.outputs.pending != '0'
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCESS_KEY:        ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:        ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
        run: node puzzle_render_long.js

      - name: Upload long puzzle video artifact
        if: steps.gate.outputs.pending != '0'
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-long-${{ github.run_id }}
          path: /tmp/*_puzzle_video.mp4
          retention-days: 3

      - name: Trigger puzzle publishers (YouTube + Blog + Facebook)
        if: steps.gate.outputs.pending != '0' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_TOKEN }}
          script: |
            const payload = {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              client_payload: {
                source: 'puzzle-long-render',
                triggered_at: new Date().toISOString()
              }
            };
            await github.rest.repos.createDispatchEvent({
              ...payload, event_type: 'trigger-puzzle-publish'
            });
            await github.rest.repos.createDispatchEvent({
              ...payload, event_type: 'trigger-puzzle-blog'
            });
            await github.rest.repos.createDispatchEvent({
              ...payload, event_type: 'trigger-puzzle-facebook'
            });
            console.log('All puzzle downstream publishers triggered');
