name: Video Render Worker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg, Python (for TTS) and Chromium runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils \
            libxext6 libxss1 fonts-liberation libappindicator3-1 \
            ca-certificates wget
          pip3 install --break-system-packages edge-tts

      - name: Test edge-tts
        run: |
          edge-tts --voice en-US-JennyNeural --text "Hello, this is a test." --write-media /tmp/test.mp3
          ls -la /tmp/test.mp3
          file /tmp/test.mp3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Install dependencies and Puppeteer browser
        run: |
          npm install
          # Ensure Chromium is downloaded (puppeteer post-install may skip in some envs)
          node -e "const p = require('puppeteer'); p.executablePath && console.log('Browser at:', p.executablePath());" || true
          npx puppeteer browsers install chrome || true

      - name: Download suspense SFX (one-time cache, skip if exists)
        run: |
          mkdir -p sfx
          if [ ! -f sfx/default.mp3 ]; then
            echo "No default.mp3 found in sfx/ - falling back to silence in worker."
            echo "Add sfx/default.mp3 (and sfx/<niche>.mp3 variants) to the repo for suspense audio."
          fi

      - name: Run video worker
        id: render
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: node worker10.js

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: /tmp/*.mp4
