name: Video Render Worker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg and Python (for TTS)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip
          pip3 install edge-tts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug environment (show what secrets/vars are set)
        run: |
          echo "SUPABASE_URL secret is set? ${{ secrets.SUPABASE_URL != '' && 'YES' || 'NO' }}"
          echo "SUPABASE_SERVICE_KEY secret is set? ${{ secrets.SUPABASE_SERVICE_KEY != '' && 'YES' || 'NO' }}"
          echo "SUPABASE_URL variable is set? ${{ vars.SUPABASE_URL != '' && 'YES' || 'NO' }}"

      - name: Run video worker
        env:
          # Try secret first, fallback to variable if secret not set
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node worker10.js

        - name: Upload video artifact
  uses: actions/upload-artifact@v4
  with:
    name: rendered-video
    path: /tmp/*.mp4
