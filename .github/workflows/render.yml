name: Video Render Worker
on:
  schedule:
    # ── 10 render slots per day, each 15 min before the matching publish.yml
    # slot, so a freshly rendered video is ready well before YouTube upload.
    # Same EDT/EST caveat as publish.yml: these are set for EDT (summer).
    # In November when US clocks fall back to EST, ADD 1 HOUR to every cron.

    - cron: '05 11 * * *'   # → publish slot 1  (7:05 AM ET)
    - cron: '05 12 * * *'    # → publish slot 2  (8:17 AM ET)
    - cron: '05 14 * * *'   # → publish slot 3  (10:43 AM ET)
    - cron: '5 16 * * *'   # → publish slot 4  (12:11 PM ET)
    - cron: '23 17 * * *'   # → publish slot 5  (1:38 PM ET)
    - cron: '7 19 * * *'    # → publish slot 6  (3:22 PM ET)
    - cron: '52 20 * * *'   # → publish slot 7  (5:07 PM ET)
    - cron: '18 23 * * *'   # → publish slot 8  (7:33 PM ET)
    - cron: '56 0 * * *'    # → publish slot 9  (9:11 PM ET)
    - cron: '32 2 * * *'    # → publish slot 10 (10:47 PM ET)

  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install FFmpeg, Python (for TTS) and Chromium runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils
          pip3 install --break-system-packages edge-tts
      - name: Test edge-tts
        run: |
          edge-tts --voice en-US-JennyNeural --text "Hello, this is a test." --write-media /tmp/test.mp3
          ls -la /tmp/test.mp3
          file /tmp/test.mp3
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run video worker
        id: render
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # ── R2 thumbnail upload (uses existing repo secrets) ──
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node worker10.js
      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: /tmp/*.mp4
