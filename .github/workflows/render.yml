name: Video Render Worker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 libxext6 libxss1 \
            fonts-liberation libappindicator3-1 xdg-utils wget ca-certificates
          pip3 install --break-system-packages edge-tts

      - name: Verify edge-tts
        run: |
          edge-tts --voice en-US-JennyNeural --text "Test." --write-media /tmp/test.mp3
          ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 /tmp/test.mp3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Puppeteer browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: puppeteer-${{ runner.os }}-

      - name: Install Node dependencies + Puppeteer browser
        run: |
          npm install
          npx puppeteer browsers install chrome || true

      - name: Run video worker
        env:
          SUPABASE_URL:      ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ENDPOINT:       ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:         ${{ vars.R2_BUCKET }}
          R2_ACCESS_KEY:     ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:     ${{ secrets.R2_SECRET_KEY }}
          R2_PUBLIC_URL:     ${{ vars.R2_PUBLIC_URL }}
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: node worker10.js

      - name: Upload rendered video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.run_id }}
          path: /tmp/*_video.mp4
          if-no-files-found: ignore
