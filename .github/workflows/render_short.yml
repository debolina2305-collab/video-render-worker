name: Short Video Render (20s Format)

on:
  # Manual trigger
  workflow_dispatch:

  # Same trigger as render.yml — all render workers fire in parallel
  # when a new batch of quiz rows is inserted. The DB-level gate below
  # ensures only the correct worker proceeds for each format.
  repository_dispatch:
    types: [trigger-render]

# Prevent pile-up: if a short render is already running, queue (not cancel)
# the next one so no short rows are ever missed.
concurrency:
  group: render-short
  cancel-in-progress: false

jobs:
  render-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── GATE: Query DB before spending ANY CI minutes ──────────────────────
      # Checks whether there are pending SHORT-format rows. If none found,
      # every subsequent step is skipped (no FFmpeg, no npm, no rendering).
      # This is the definitive fix for the double-render problem:
      #  • render.yml   checks long_status=pending_long  → skips if none
      #  • render_short checks short_status=pending_short → skips if none
      # The two workflows can fire simultaneously; each only proceeds when it
      # has rows for its own format. A short row cannot trigger the long worker
      # and vice versa.
      - name: Gate — check for pending short-format rows
        id: gate
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ROWS=$(curl -sf \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/quiz?short_status=eq.pending_short&assigned_format=eq.short&is_active=eq.true&quiz_enriched=eq.true&select=id&limit=1" \
          | jq 'length' 2>/dev/null || echo "0")
          echo "pending=$ROWS" >> $GITHUB_OUTPUT
          if [ "$ROWS" = "0" ]; then
            echo "[GATE] No pending short-format rows — skipping entire render job."
          else
            echo "[GATE] Found $ROWS pending short row(s) — proceeding with render."
          fi

      - name: Install FFmpeg, Python and Chromium runtime deps
        if: steps.gate.outputs.pending != '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils
          pip3 install --break-system-packages edge-tts

      - name: Test edge-tts
        if: steps.gate.outputs.pending != '0'
        run: |
          edge-tts --voice en-US-JennyNeural --text "Hello, test." --write-media /tmp/test.mp3
          ls -la /tmp/test.mp3

      - name: Setup Node.js
        if: steps.gate.outputs.pending != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.gate.outputs.pending != '0'
        run: npm install

      - name: Run short video worker (Worker 10-Short)
        if: steps.gate.outputs.pending != '0'
        id: render_short
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCESS_KEY:        ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:        ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
        run: node worker10_short.js

      - name: Upload short video artifact
        if: steps.gate.outputs.pending != '0'
        uses: actions/upload-artifact@v4
        with:
          name: short-video-${{ github.run_id }}
          path: /tmp/*_short_video.mp4
          retention-days: 3
