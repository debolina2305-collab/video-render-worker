name: Short Video Render (20s Format)

on:
  # Manual trigger — run whenever you want to generate a 20s short
  workflow_dispatch:

  # Event-driven: triggered by render.yml after a normal video succeeds
  repository_dispatch:
    types: [trigger-render-short]

jobs:
  render-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg, Python and Chromium runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils
          pip3 install --break-system-packages edge-tts

      - name: Test edge-tts
        run: |
          edge-tts --voice en-US-JennyNeural --text "Hello, test." --write-media /tmp/test.mp3
          ls -la /tmp/test.mp3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run short video worker (Worker 10-Short)
        id: render_short
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCESS_KEY:        ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:        ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
        run: node worker10_short.js

      - name: Upload short video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: short-video-${{ github.run_id }}
          path: /tmp/*_short_video.mp4
          retention-days: 3
