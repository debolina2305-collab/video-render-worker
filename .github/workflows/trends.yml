name: Fetch Trending Topics

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: all | trends | rss | fallback'
        required: true
        default: 'all'
        type: choice
        options: [all, trends, rss, fallback]

jobs:
  fetch:
    name: Waterfall (trendspyg → RSS gap → fallback gap)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome (for trendspyg CSV path)
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install trendspyg feedparser requests tavily-python selenium

      - name: Run
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
        run: python fetch_trends.py --mode ${{ github.event.inputs.mode || 'all' }}
