name: Fetch Trending Topics

on:
  schedule:
    # ── 10 fetch slots per day ─────────────────────────────────────────────
    # trends.yml is the ONLY cron in the pipeline now.
    # All downstream workers (render, publish, blog, facebook) are triggered
    # automatically via repository_dispatch events when each step succeeds.
    # Chain: trends → [Worker 8 via HTTP] → render → publish + blog + facebook
    #
    # Times are US Eastern (EDT = UTC-4, summer 2026).
    # In November when clocks fall back to EST, ADD 1 HOUR to every cron.

  
    - cron: '0 22 * * *'    # 6:00 PM ET
    - cron: '0 23 * * *'    # 7:00 PM ET
    - cron: '0 0 * * *'     # 8:00 PM ET
 

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        default: 'trends'
        type: choice
        options: [trends]

jobs:
  fetch:
    name: Fetch Trending Topics
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install trendspyg requests tavily-python

      - name: Run fetch_trends.py
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
          R2_ACCESS_KEY:        ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:        ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
        run: python fetch_trends.py --mode trends

      # ── Step 2: Trigger Worker 8 (Cloudflare) via HTTP ──────────────────
      # Worker 8 runs on Cloudflare Workers with its own cron, but we also
      # trigger it immediately after trends are fetched so the quiz is
      # generated right away without waiting for the next Cloudflare cron tick.
      # Worker 8 picks up the newest quiz_queue row automatically.
      - name: Trigger Worker 8 (Quiz Generator on Cloudflare)
        run: |
          echo "Triggering Worker 8 to generate quiz from new trending topic..."
          HTTP_STATUS=$(curl -s -o /tmp/w8_response.txt -w "%{http_code}" \
            -X POST \
            "${{ secrets.WORKER8_URL }}/generate-quiz" \
            -H "Content-Type: application/json" \
            --max-time 60)
          echo "Worker 8 HTTP status: $HTTP_STATUS"
          cat /tmp/w8_response.txt || true
          # Non-200 is a warning not a failure — Worker 8 also runs on its own cron
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "WARNING: Worker 8 returned $HTTP_STATUS — it will retry on its own cron schedule"
          fi

      # ── Step 3: Wait briefly then trigger render pipeline ───────────────
      # Give Worker 8 ~30s to finish inserting quiz rows into Supabase,
      # then fire the render workflow via repository_dispatch.
      # render.yml picks up the newest pending quiz row automatically.
      - name: Wait for Worker 8 to complete
        run: sleep 45

      - name: Trigger Render Pipeline (Worker 10)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event_type: 'trigger-render',
              client_payload: {
                source: 'trends',
                triggered_at: new Date().toISOString()
              }
            });
            console.log('Render pipeline triggered via repository_dispatch');
