name: Fetch Trending Topics

on:
  schedule:
    # ── 10 fetch slots per day, each 25 min before the matching publish.yml
    # slot (5 min before Worker 8 generates, 20 min before Worker 10 renders).
    # Chain: trends(-25) → worker8(-20) → render.yml(-15) → publish.yml(0)
    # Same EDT/EST caveat: set for EDT (summer). ADD 1 HOUR in November.

    - cron: '55 10 * * *'   # → publish slot 1  (7:05 AM ET)
    - cron: '52 11 * * *'   # → publish slot 2  (8:17 AM ET)
    - cron: '54 13 * * *'   # → publish slot 3  (10:43 AM ET)
    - cron: '56 15 * * *'   # → publish slot 4  (12:11 PM ET)
    - cron: '50 16 * * *'   # → publish slot 5  (1:38 PM ET)
    - cron: '57 18 * * *'   # → publish slot 6  (3:22 PM ET)
    - cron: '55 20 * * *'   # → publish slot 7  (5:07 PM ET)
    - cron: '56 22 * * *'   # → publish slot 8  (7:33 PM ET)
    - cron: '53 0 * * *'    # → publish slot 9  (9:11 PM ET)
    - cron: '52 2 * * *'    # → publish slot 10 (10:47 PM ET)

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: trends (only option now — RSS/fallback removed)'
        required: true
        default: 'trends'
        type: choice
        options: [trends]

jobs:
  fetch:
    name: Trendspyg (Google Trends only — RSS/fallback removed)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome (for trendspyg CSV path)
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install trendspyg requests tavily-python

      - name: Run
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
          R2_ACCESS_KEY:        ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:        ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
        run: python fetch_trends.py --mode trends
