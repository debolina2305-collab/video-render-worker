name: Fetch Trending Topics

on:
  schedule:
   # Slot 1:  7:05 AM ET  → 12:05 UTC
    - cron: '5 12 * * *'
    # Slot 2:  8:17 AM ET  → 13:17 UTC  (peak morning commute)
    - cron: '17 13 * * *'
    # Slot 3: 10:43 AM ET  → 15:43 UTC  (mid-morning break)
    - cron: '43 15 * * *'
    # Slot 4: 12:11 PM ET  → 17:11 UTC  (lunch peak)
    - cron: '11 17 * * *'
    # Slot 5:  1:38 PM ET  → 18:38 UTC  (post-lunch scroll)
    - cron: '38 18 * * *'
    # Slot 6:  3:22 PM ET  → 20:22 UTC  (school out, afternoon peak)
    - cron: '22 20 * * *'
    # Slot 7:  5:07 PM ET  → 22:07 UTC  (evening commute)
    - cron: '7 22 * * *'
    # Slot 8:  7:33 PM ET  → 00:33 UTC  (prime time starts)
    - cron: '33 0 * * *'
    # Slot 9:  9:11 PM ET  → 02:11 UTC  (peak prime time)
    - cron: '11 2 * * *'
    # Slot 10: 10:47 PM ET → 03:47 UTC  (late night scroll)
    - cron: '47 3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: all | trends | rss | fallback'
        required: true
        default: 'all'
        type: choice
        options: [all, trends, rss, fallback]

jobs:
  fetch:
    name: Waterfall (trendspyg → RSS gap → fallback gap)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome (for trendspyg CSV path)
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install trendspyg feedparser requests tavily-python selenium

      - name: Run
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
        run: python fetch_trends.py --mode ${{ github.event.inputs.mode || 'all' }}
