name: Facebook Publisher

on:
  schedule:
    # ── 6 publish slots per day, targeted at US Eastern Time audience ──────
    # IMPORTANT: GitHub Actions cron runs in UTC.
    # These crons are set for EDT (UTC-4, summer 2026).
    # When US clocks fall back to EST in November, ADD 1 HOUR to every cron.
    #
    # Facebook Reels peak times for US audience (slightly offset from YT
    # slots so both platforms don't hammer R2/Supabase simultaneously):
    #
    # Slot 1:  8:30 AM ET  → 12:30 UTC  (EDT) — morning scroll
    - cron: '30 12 * * *'
    # Slot 2: 11:15 AM ET  → 15:15 UTC  (EDT) — mid-morning
    - cron: '15 15 * * *'
    # Slot 3:  1:00 PM ET  → 17:00 UTC  (EDT) — lunch peak
    - cron: '0 17 * * *'
    # Slot 4:  4:45 PM ET  → 20:45 UTC  (EDT) — after school/work
    - cron: '45 20 * * *'
    # Slot 5:  7:00 PM ET  → 23:00 UTC  (EDT) — prime time
    - cron: '0 23 * * *'
    # Slot 6:  9:30 PM ET  → 01:30 UTC next day (EDT) — late night
    - cron: '30 1 * * *'

  workflow_dispatch:   # keep manual trigger for testing

jobs:
  facebook-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Facebook publisher
        env:
          SUPABASE_URL:           ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          FB_PAGE_ID:             ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN:   ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: node worker13.js
