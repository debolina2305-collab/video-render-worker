name: Puzzle Render — Medium Format

# ─────────────────────────────────────────────────────────────────────────
# Runs puzzle_render_medium.js — the "medium" puzzle renderer: the same
# short-no-intro flow (avatar strip, no host hook clip, Q+Options straight
# into a 5s countdown) PLUS one extra beat spliced in between "time's up"
# and the CTA4 screen: an answer reveal (correct option highlighted,
# explanation panel, confetti — borrowed from the long renderer's Step 10).
#
# This reads/writes `puzzle` rows where medium_status = 'pending_medium'
# and assigned_format = 'medium' (assigned by puzzle_generator.js's
# assign_puzzle_format RPC). It never touches short_status or long_status
# rows, so it can run alongside render_puzzle_short_nointro.yml and
# render_puzzle_long.yml without racing them for the same rows.
# ─────────────────────────────────────────────────────────────────────────

on:
  # Manual trigger — click "Run workflow" in the Actions tab
  workflow_dispatch:
    inputs:
      trigger_publish:
        description: 'Trigger downstream publishers (YouTube/Blog/Facebook) after render?'
        type: boolean
        default: false

  # Fired by puzzle_generator.js's repository_dispatch (trigger-puzzle-render)
  # alongside the short/long variants — each workflow gates on its own
  # status column, so only the row(s) actually assigned to this format get
  # picked up here.
  repository_dispatch:
    types: [trigger-puzzle-render, trigger-puzzle-render-medium]

# Queue — never cancel in progress, so no puzzle rows are missed
concurrency:
  group: render-puzzle-medium
  cancel-in-progress: false

jobs:
  render-puzzle-medium:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── GATE ────────────────────────────────────────────────────────────────
      # Query the PUZZLE table (NOT quiz). Exits in ~2s if nothing pending.
      - name: Gate — check for pending medium puzzle rows
        id: gate
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ROWS=$(curl -sf \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/puzzle?medium_status=eq.pending_medium&assigned_format=eq.medium&is_active=eq.true&puzzle_enriched=eq.true&select=id&limit=1" \
          | jq 'length' 2>/dev/null || echo "0")
          echo "pending=$ROWS" >> $GITHUB_OUTPUT
          if [ "$ROWS" = "0" ]; then
            echo "[GATE] No pending medium puzzle rows — skipping render."
          else
            echo "[GATE] Found $ROWS pending medium puzzle row(s) — proceeding."
          fi

      - name: Install FFmpeg, Python and Chromium runtime deps
        if: steps.gate.outputs.pending != '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libx11-xcb1 libxcomposite1 libxdamage1 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils
          pip3 install --break-system-packages edge-tts

      - name: Test edge-tts
        if: steps.gate.outputs.pending != '0'
        run: |
          edge-tts --voice en-US-JennyNeural --text "Puzzle challenge ready." --write-media /tmp/test.mp3
          ls -la /tmp/test.mp3

      - name: Setup Node.js
        if: steps.gate.outputs.pending != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.gate.outputs.pending != '0'
        run: npm install

      - name: Render medium puzzle video (timeup + answer reveal + CTA)
        if: steps.gate.outputs.pending != '0'
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCESS_KEY:        ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:        ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}
        run: node puzzle_render_medium.js

      - name: Upload medium puzzle video artifact
        if: steps.gate.outputs.pending != '0'
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-medium-${{ github.run_id }}
          path: /tmp/*_puzzle_medium_video.mp4
          retention-days: 3

      # ── Trigger downstream puzzle publishers (opt-in) ────────────────────
      # Only fires on manual runs where you explicitly set trigger_publish
      # to true. repository_dispatch runs never auto-publish, so you can
      # safely test renders without them going live.
      - name: Trigger puzzle publishers (YouTube + Blog + Facebook)
        if: steps.gate.outputs.pending != '0' && success() && github.event.inputs.trigger_publish == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_TOKEN }}
          script: |
            const payload = {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              client_payload: {
                source: 'puzzle-medium-render',
                triggered_at: new Date().toISOString()
              }
            };
            await github.rest.repos.createDispatchEvent({
              ...payload, event_type: 'trigger-puzzle-publish'
            });
            console.log('Puzzle YouTube publish triggered');
            await github.rest.repos.createDispatchEvent({
              ...payload, event_type: 'trigger-puzzle-blog'
            });
            console.log('Puzzle blog triggered');
            await github.rest.repos.createDispatchEvent({
              ...payload, event_type: 'trigger-puzzle-facebook'
            });
            console.log('Puzzle Facebook triggered');
