name: Quiz Blog Generator

on:
  # ── Event-driven trigger from render.yml ──────────────────────────────
  repository_dispatch:
    types: [trigger-blog]

  # ── Manual trigger for testing ────────────────────────────────────────
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run blog generator (Worker 12)
        env:
          SUPABASE_URL:         ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node worker12.js
